spring:
  application:
    name: fastchat

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000

  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai}
      chat:
        options:
          model: ${GROQ_MODEL:llama-3.3-70b-versatile}
          temperature: ${TEMPERATURE:0.1}
          max-tokens: ${MAX_TOKENS:3000}

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

server:
  port: ${PORT:8080}

# Keep Alive Service Configuration
app:
  url: ${APP_URL:http://localhost:8080}
  health-check:
    endpoint: ${APP_HEALTH_CHECK_ENDPOINT:/api/health}

logging:
  level:
    root: INFO
    org.springframework.jdbc.core: WARN
